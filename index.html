    .card img{width:100%;height:180px;object-fit:cover;transition:transform 0.4s,filter 0.5s;}
    .card:hover img{transform:scale(1.05);filter:brightness(1.15);}
    .card h3{padding:1.2rem 1rem 0.5rem;font-size:1.2rem;text-align:center;text-transform:capitalize;}

    /* modal */
    #game-modal{position:fixed;inset:0;background:rgba(0,0,0,0.98);z-index:2000;display:none;align-items:center;justify-content:center;flex-direction:column;}
    #game-modal.active{display:flex;}
    .modal-header{position:absolute;top:15px;right:15px;display:flex;gap:15px;z-index:10;}
    .modal-btn{background:rgba(255,255,255,0.1);border:1px solid var(--accent);color:var(--accent);width:44px;height:44px;border-radius:50%;font-size:1.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;}
    .modal-btn:hover{background:var(--accent);color:#000;transform:scale(1.1);}
    .modal-wrapper{width:95vw;height:90vh;max-width:1800px;background:#000;border:2px solid var(--accent);overflow:hidden;position:relative;box-shadow:0 0 80px rgba(255,255,255,0.25);}
    iframe{width:100%;height:100%;border:none;}

    footer{text-align:center;padding:3rem;border-top:1px solid var(--accent);color:var(--gray);font-size:0.95rem;}
    #particles{position:fixed;inset:0;z-index:-1;opacity:0.12;pointer-events:none;}
    #proxy-launcher{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:999;background:rgba(0,0,0,0.7);border:1px solid var(--accent);border-radius:50%;width:70px;height:70px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 20px rgba(221,221,221,0.25);transition:all 0.3s ease;}
    #proxy-launcher:hover{transform:translateX(-50%) scale(1.12);box-shadow:0 0 35px rgba(221,221,221,0.4);background:rgba(20,20,20,0.85);}
    #proxy-launcher span{font-size:2.8rem;color:var(--accent);filter:grayscale(100%) brightness(1.3);}

  <script>
    // ── GAME URLS — loads from games/ folder on your host ──
    const gameUrls = {
      "1v1lol":          "games/1v1lol/index.html",
      "2048":            "games/2048/index.html",
      "bob-the-robber-2":"games/bob-the-robber-2/index.html",
      "drive-mad":       "games/drive-mad/index.html",
      "moto-x3m":        "games/moto-x3m/index.html",
      "motox3m2":        "games/motox3m2/index.html",
      "retro-bowl":      "games/retro-bowl/index.html",
      "slope":           "games/slope/index.html",
      "vex3":            "games/vex3/index.html",
      "vex4":            "games/vex4/index.html",
      "vex5":            "games/vex5/index.html",
      "vex6":            "games/vex6/index.html",
      "vex7":            "games/vex7/index.html",
    };

    // ── MODAL ──
    const gameModal   = document.getElementById('game-modal');
    const gameIframe  = document.getElementById('game-iframe');
    const closeGame   = document.getElementById('close-modal');
    const fsBtn       = document.getElementById('toggle-fullscreen');
    const gameWrapper = gameModal.querySelector('.modal-wrapper');

    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => {
        openSmartLinkAd();
        const url = gameUrls[card.getAttribute('data-game')] || 'about:blank';
        gameIframe.src = url;
        gameModal.classList.add('active');
        document.body.classList.add('modal-open');
      });
    });

    closeGame.addEventListener('click', () => {
      openSmartLinkAd();
      gameModal.classList.remove('active');
      document.body.classList.remove('modal-open');
      gameIframe.src = '';
    });

    fsBtn.addEventListener('click', () => {
      const el = gameIframe;
      // Try standard fullscreen first, then webkit for iOS/iPad
      if (el.requestFullscreen) {
        el.requestFullscreen().catch(() => {});
      } else if (el.webkitRequestFullscreen) {
        el.webkitRequestFullscreen();
      } else if (el.webkitEnterFullscreen) {
        el.webkitEnterFullscreen();
      }
      // Update button icon
      fsBtn.textContent = '✕⛶';
      document.addEventListener('fullscreenchange', () => {
        fsBtn.textContent = document.fullscreenElement ? '⊡' : '⛶';
      });
      document.addEventListener('webkitfullscreenchange', () => {
        fsBtn.textContent = document.webkitFullscreenElement ? '⊡' : '⛶';
      });
    });

    document.getElementById('proxy-launcher').addEventListener('click', () => {
      openSmartLinkAd();
      window.location.href = 'quiz.html';
    });

    // ── SCROLL REVEAL ANIMATION ──
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });

    // Observe hero elements
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    // Staggered card animation
    const cardObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          setTimeout(() => {
            entry.target.classList.add('visible');
            entry.target.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
          }, i * 80);
          cardObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.05 });

    document.querySelectorAll('.card').forEach(card => cardObserver.observe(card));

    // ── PARTICLES ──
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let pts = [];
    class P {
      constructor(){ this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.size=Math.random()*1.8+0.4; this.sx=Math.random()*0.4-0.2; this.sy=Math.random()*0.4-0.2; }
      update(){ this.x+=this.sx; this.y+=this.sy; if(this.x<0||this.x>canvas.width)this.sx*=-1; if(this.y<0||this.y>canvas.height)this.sy*=-1; }
      draw(){ ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); }
    }
    function init(){ pts=[]; for(let i=0;i<100;i++) pts.push(new P()); }
    function animate(){ ctx.clearRect(0,0,canvas.width,canvas.height); pts.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(animate); }
    window.addEventListener('resize',()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; init(); });
    init(); animate();
  </script>
